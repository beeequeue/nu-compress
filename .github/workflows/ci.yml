name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: set up nushell
        uses: hustcer/setup-nu@ccd5bb5426b05a32009c2ba967946231f3919c97 # v3.25
        with:
          version: "0.114"

      - shell: nu {0}
        run: |
          ls **/*.nu
          | where name != "mod.nu"
          | par-each { |it|
            let path = $it.name
            nu --ide-check 100 $path
            | from json --objects
            | where type != hint
            | if ($in | is-not-empty) {
              print $"Errors in ($path):";
              print $in;
              print "\n";
              exit 1;
            }
          }
